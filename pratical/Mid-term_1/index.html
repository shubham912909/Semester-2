<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratical 1</title>
    <style>
        body{
            background-color: blanchedalmond;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box1{
            border: .2rem solid red;
            box-shadow: 0 0 13px 5px rgba(215, 52, 52, 0.5);
            width: 450px;
            
        }
        .check{
            display: flex;
            flex-direction: column;
            width: 300px;
            margin: 0 auto;
            padding: 20px;
        }
        button{
            margin-top: 20px;
            padding: 10px;
            background-color: red;
            color: white;
            border: none;
            cursor: pointer;
        }




    </style>
</head>
<body>
    <div class="box1">
        <form class="check" id="form">
            <h3>ODD OR EVEN NUMBER CHECKER</h3>
            <label for="number">Enter a number:</label>
            <input type="number" id="number" name="number" required placeholder="Enter number to check" min="1">
            <button type="button" onclick="checkNumber()">Check</button>
            <!-- <input type="submit" value="Check"> -->
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
